<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrface="allowedDevices: any; cameraDirection: front; mirroredDisplay: true"
  zcustom-background>
  <a-assets>
    <a-asset-item id="morphTargets" src="./assets/morphTargets.glb"></a-asset-item>
  </a-assets>

  <a-camera
    look-controls="enabled: false"
    wasd-controls="enabled: false"
    position="0 2 0"></a-camera>

  <xrextras-faceanchor id="face">
    <a-entity
      gltf-model="./assets/untitled.glb"
      scale="1.1 1.1 1.1"
      xrextras-hider-material></a-entity>
    <!-- <a-entity gltf-model="#morphTargets" position="0 0 0" face-texture></a-entity> -->
  </xrextras-faceanchor>

  <a-plane position="0 2 -5" scale="10 10 1" color="black"></a-plane>

  <a-light type="directional" target="#face" position="0 1.8 3" intensity="0.8"></a-light>
  <a-light type="ambient" intensity="0.8"></a-light>
</a-scene>
