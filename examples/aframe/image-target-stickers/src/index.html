<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.3.0"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>

<!-- Other external scripts and meta tags can also be added. -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<script src="https://unpkg.com/aframe-hologram-shader"></script>

</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2023 8th Wall, Inc. -->
<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<a-scene
  xrextras-gesture-detector
  landing-page="backgroundColor: black; mediaSrc: #img; url: 8th.io/birthday-pins"
  xrextras-loading
  xrextras-runtime-error
  renderer="colorManagement:true"
  xrweb="disableWorldTracking: true"
>
  <a-assets>
    <img id="img" src="./assets/trans.png" />
  </a-assets>

  <a-camera
    position="0 4 10"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;"
  >
  </a-camera>

  <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

  <a-light type="ambient" intensity="0.7"></a-light>

  <!-- Note: "name:" must be set to the name of the image target uploaded to the 8th Wall Console -->
  <xrextras-named-image-target name="image">
    <!-- Add a child entity of the image target. -->
    <a-circle color="black" radius="0.46"></a-circle>
    <a-plane
      src="#img"
      material="transparent: true; shader: hologram; numGlitchBars: 20"
      position="0 0 0.5"
      animation__spin="property: rotation; from: 0 0 0; to: 0 0 360; loop: true; easing: linear; dur: 10000"
    ></a-plane>
  </xrextras-named-image-target>
</a-scene>

</body>
