<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>a-frame: embedded</title>
  <meta itemprop="name" content="a-frame: embedded">
  <meta name="twitter:title" content="a-frame: embedded">
  <meta property="og:title" content="a-frame: embedded">
  <meta property="og:site_name" content="a-frame: embedded">
  <meta name="description" content="this project demonstrates how to use the embedded component to achieve a non-fullscreen AR canvas.">
  <meta itemprop="description" content="this project demonstrates how to use the embedded component to achieve a non-fullscreen AR canvas.">
  <meta property="og:description" content="this project demonstrates how to use the embedded component to achieve a non-fullscreen AR canvas.">
  <meta name="twitter:description" content="this project demonstrates how to use the embedded component to achieve a non-fullscreen AR canvas.">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.3.0.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">
  </script>

<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.3.0"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>

<!-- Other external scripts and meta tags can also be added. -->

</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- body.html is optional; elements will be added to your html body after app.js is loaded. -->

<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-gesture-detector
  xrweb="allowedDevices: any"
  embedded>
  <a-entity
    light="
      type: directional; 
      castShadow: true; 
      color: white; 
      intensity: 0.5"
    position="5 10 7">
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-camera
    id="camera"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;"
    position="0 2 2"></a-camera>

  <a-box
    xrextras-hold-drag
    position="0 0.5 0"
    material="
      color: #AD50FF; shader: flat; 
      src: https://cdn.8thwall.com/web/assets/cube-texture.png"
    shadow>
  </a-box>

  <a-plane
    id="ground"
    height="2000"
    width="2000"
    rotation="-90 0 0"
    material="shader: shadow; opacity: 0.67"
    shadow>
  </a-plane>
</a-scene>

</body>

</html>
