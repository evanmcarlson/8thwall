<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrface="allowedDevices: any; cameraDirection: front; mirroredDisplay: true">
  <a-assets>
    <a-asset-item id="morphTargets" src="./assets/morphTargets.glb"></a-asset-item>
  </a-assets>

  <a-camera
    look-controls="enabled: false"
    wasd-controls="enabled: false"
    position="0 2 0"></a-camera>

  <a-entity gltf-model="#morphTargets" position="0 2 -3" face-texture face-rotation></a-entity>

  <a-light type="directional" target="#face" position="0 1.8 3" intensity="0.8"></a-light>
  <a-light type="ambient" intensity="0.8"></a-light>
</a-scene>
