<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>a-frame: selective bloom</title>
  <meta itemprop="name" content="a-frame: selective bloom">
  <meta name="twitter:title" content="a-frame: selective bloom">
  <meta property="og:title" content="a-frame: selective bloom">
  <meta property="og:site_name" content="a-frame: selective bloom">
  <meta name="description" content="this project demonstrates how to achieve selective bloom postprocessing in a-frame">
  <meta itemprop="description" content="this project demonstrates how to achieve selective bloom postprocessing in a-frame">
  <meta property="og:description" content="this project demonstrates how to achieve selective bloom postprocessing in a-frame">
  <meta name="twitter:description" content="this project demonstrates how to achieve selective bloom postprocessing in a-frame">
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.4.1.min.js"></script>
  <script crossorigin="anonymous" src="./external/xrextras/xrextras.js"></script>
  <script crossorigin="anonymous" src="./external/landing-page/landing-page.js"></script>
  <script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="face, slam">
  </script>

<!-- Copyright (c) 2022 8th Wall, Inc. -->
<!-- head.html is optional; elements will be added to your html head before app.js is loaded. -->

<!-- Use "8thwall:" meta tags to hook into 8th Wall's build process and developer tools. -->
<meta name="8thwall:renderer" content="aframe:1.4.1"/>
<meta name="8thwall:package" content="@8thwall.xrextras"/>
<meta name="8thwall:package" content="@8thwall.landing-page"/>

<!-- Other external scripts and meta tags can also be added. -->
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.147.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.147.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { GlitchPass } from 'three/addons/postprocessing/GlitchPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  import { TexturePass } from 'three/addons/postprocessing/TexturePass.js';
  import { AfterimagePass } from 'three/addons/postprocessing/AfterimagePass.js';
  import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

  window.THREE = { ...THREE };
  window.THREE.GLTFLoader = GLTFLoader;
  window.THREE.EffectComposer = EffectComposer;
  window.THREE.RenderPass = RenderPass;
  window.THREE.GlitchPass = GlitchPass;
  window.THREE.UnrealBloomPass = UnrealBloomPass;
  window.THREE.TexturePass = TexturePass;
  window.THREE.AfterimagePass = AfterimagePass;
  window.THREE.ShaderPass = ShaderPass;
  window.dispatchEvent(new CustomEvent('threeloaded'));
</script>

</head>

<body>
<script src="bundle.js"></script>
<!-- Copyright (c) 2022 8th Wall, Inc. -->

<a-scene
  xrextras-tap-recenter
  landing-page
  xrextras-loading
  xrextras-runtime-error
  xrextras-gesture-detector
  xrweb="allowedDevices: any"
  postprocessing>
  <a-entity
    light="
      type: directional; 
      castShadow: true; 
      color: white; 
      intensity: 0.5"
    position="5 10 7">
  </a-entity>

  <a-light type="ambient" intensity="0.5"></a-light>

  <a-camera position="0 2 2"></a-camera>

  <a-box
    xrextras-one-finger-rotate
    position="0 0.5 -1.0"
    material="
      color: #AD50FF; shader: flat; 
      src: https://cdn.8thwall.com/web/assets/cube-texture.png"
    shadow
    data-bloom="bloom">
  </a-box>

  <a-box
    xrextras-one-finger-rotate
    position="-0.5 0.5 -2.5"
    material="
      color: #AD50FF; shader: flat; 
      src: https://cdn.8thwall.com/web/assets/cube-texture.png"
    shadow
    data-bloom="non-bloom">
  </a-box>

  <a-plane
    height="2000"
    width="2000"
    rotation="-90 0 0"
    material="shader: shadow; opacity: 0.67"
    shadow>
  </a-plane>
</a-scene>

</body>

</html>
